name: Checks

on:
  push:
    branches: [main]
  pull_request:

jobs:
  doctor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Full doctor still reports legacy content errors (sources/links), so the
      # CI gate runs only the checks that are green and must stay green.
      - name: doctor (skills, external)
        run: python3 scripts/doctor.py --only skills,external
