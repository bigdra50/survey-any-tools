# vocab/strength-levels.yml — references frontmatter `strength:` の統制語彙
#
# エビデンス強度。読者（と /ask）の信頼較正のための限定子
# (Toulmin 論証モデルの qualifier / EBM の GRADE に倣う)。
# 上から経験的主張の強い順に並べる。
#
# 設計判断 (tasks/reader-centered-design-2026-07.md R3):
#   - 計画の 7 値に official-docs を加えた 8 値で確定。
#     技術系 reference は仕様・公式ドキュメント由来が多く、
#     blog と peer-reviewed の間に収まらないため独立値にした
#   - official-docs のみ経験階層の外: API・仕様の「事実」には最も権威があるが、
#     経験的主張（効果・性能比較など）の根拠にはならない
#   - 既存 566 件への遡及付与はしない。doctor の「strength 欠落」警告で漸進的に付与
#
# スキーマ正本: scripts/_schema.py REFERENCE_STRENGTHS / viewer/src/content.config.ts

