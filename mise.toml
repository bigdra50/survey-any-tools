[tasks.new]
description = "Create a new survey topic (memo template)"
run = """
#!/usr/bin/env bash
set -euo pipefail

topic="${1:?Usage: mise run new <topic-name>}"
dir="topics/${topic}"
today=$(date +%Y-%m-%d)

if [ -d "$dir" ]; then
  echo "Error: ${dir} already exists" >&2
  exit 1
fi

mkdir -p "$dir"
sed "s/YYYY-MM-DD/${today}/g" templates/memo.md > "${dir}/README.md"
echo "Created ${dir}/README.md"
"""

