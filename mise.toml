[tasks.new-notebook]
description = "Create a new Jupyter Notebook topic"
run = """
#!/usr/bin/env bash
set -euo pipefail

topic="${1:?Usage: mise run new-notebook <topic-name>}"
dir="topics/${topic}"
today=$(date +%Y-%m-%d)

if [ -d "$dir" ]; then
  echo "Error: ${dir} already exists" >&2
  exit 1
fi

mkdir -p "$dir"
sd 'YYYY-MM-DD' "${today}" templates/notebook.ipynb > "${dir}/analysis.ipynb" 2>/dev/null \
  || sed "s/YYYY-MM-DD/${today}/g" templates/notebook.ipynb > "${dir}/analysis.ipynb"
echo "Created ${dir}/analysis.ipynb"
"""

[tasks.index]
description = "Regenerate INDEX.md from topic frontmatter"
run = """
#!/usr/bin/env bash
set -euo pipefail

{
  echo "# Survey Index"
  echo ""
  echo "Auto-generated: $(date +%Y-%m-%d)"
  echo ""
  echo "| Title | Status | Tags | Created |"
  echo "|-------|--------|------|---------|"

  for readme in topics/*/README.md; do
    [ -f "$readme" ] || continue
    dir=$(dirname "$readme")
    topic=$(basename "$dir")

    title=$(sed -n 's/^title: *"\\(.*\\)"/\\1/p' "$readme" | head -1)
    st=$(sed -n 's/^status: *\\(.*\\)/\\1/p' "$readme" | head -1)
    tags=$(sed -n 's/^tags: *\\[\\(.*\\)\\]/\\1/p' "$readme" | head -1)
    created=$(sed -n 's/^created: *\\(.*\\)/\\1/p' "$readme" | head -1)

    [ -z "$title" ] && title="$topic"
    [ -z "$st" ] && st="?"

    echo "| [${title}](topics/${topic}/) | ${st} | ${tags} | ${created} |"
  done | sort -t'|' -k5 -r
} > INDEX.md

echo "INDEX.md updated"
"""

[tasks.fm-dump]
description = "Dump all topic frontmatter as JSON array"
run = """
#!/usr/bin/env bash
set -euo pipefail

for readme in topics/*/README.md; do
  [ -f "$readme" ] || continue
  dir=$(dirname "$readme")
  topic=$(basename "$dir")

  frontmatter=$(awk '/^---$/{if(n++)exit}n' "$readme")

  title=$(echo "$frontmatter" | sed -n 's/^title: *"\\(.*\\)"/\\1/p')
  status=$(echo "$frontmatter" | sed -n 's/^status: *\\(.*\\)/\\1/p')
  tags_raw=$(echo "$frontmatter" | sed -n 's/^tags: *\\[\\(.*\\)\\]/\\1/p')
  related_raw=$(echo "$frontmatter" | sed -n 's/^related: *\\[\\(.*\\)\\]/\\1/p')
  created=$(echo "$frontmatter" | sed -n 's/^created: *\\(.*\\)/\\1/p')

  if [ -n "$tags_raw" ]; then
    tags_json=$(echo "$tags_raw" | tr ',' '\\n' | sed 's/^ *//;s/ *$//' | jq -R . | jq -s .)
  else
    tags_json="[]"
  fi

  if [ -n "$related_raw" ]; then
    related_json=$(echo "$related_raw" | tr ',' '\\n' | sed 's/^ *//;s/ *$//' | jq -R . | jq -s .)
  else
    related_json="[]"
  fi

  jq -n \\
    --arg topic "$topic" \\
    --arg title "${title:-$topic}" \\
    --arg status "${status:-unknown}" \\
    --argjson tags "$tags_json" \\
    --argjson related "$related_json" \\
    --arg created "${created:-}" \\
    --arg path "topics/${topic}/" \\
    '{topic: $topic, title: $title, status: $status, tags: $tags, related: $related, created: $created, path: $path}'
done | jq -s .
"""

[tasks.fm-related]
description = "Find topics related to the given topic by tag overlap"
run = """
#!/usr/bin/env bash
set -euo pipefail

target="${1:?Usage: mise run fm-related <topic-name>}"

dump=$(mise run fm-dump 2>/dev/null)

target_tags=$(echo "$dump" | jq -e --arg t "$target" '.[] | select(.topic == $t) | .tags')
if [ $? -ne 0 ]; then
  echo "Error: topic '${target}' not found" >&2
  exit 1
fi

echo "$dump" | jq -r --arg t "$target" --argjson ttags "$target_tags" '
  .[] | select(.topic != $t) |
  . as $item |
  ($item.tags | map(select(. as $tag | $ttags | index($tag)))) as $shared |
  select(($shared | length) > 0) |
  "\\($shared | length)\\t\\($item.topic)\\t\\($shared | join(", "))"
' | sort -t$'\\t' -k1 -rn | while IFS=$'\\t' read -r count topic shared; do
  printf "%d\\t%-30s [%s]\\n" "$count" "$topic" "$shared"
done
"""

[tasks.fm-tags]
description = "List all unique tags with usage count"
run = """
#!/usr/bin/env bash
set -euo pipefail

mise run fm-dump 2>/dev/null | jq -r '.[].tags[]' | sort | uniq -c | sort -rn
"""

[tasks.search]
description = "Search topics by tag"
run = """
#!/usr/bin/env bash
set -euo pipefail

tag="${1:?Usage: mise run search <tag>}"
echo "Topics tagged with: ${tag}"
echo "---"
rg -l "tags:.*${tag}" topics/*/README.md 2>/dev/null | while read -r f; do
  dir=$(dirname "$f")
  topic=$(basename "$dir")
  title=$(sed -n 's/^title: *"\\(.*\\)"/\\1/p' "$f" | head -1)
  [ -z "$title" ] && title="$topic"
  echo "- ${title} (topics/${topic}/)"
done
"""

[tasks.list]
description = "List all topics with status"
run = """
#!/usr/bin/env bash
set -euo pipefail

for readme in topics/*/README.md; do
  [ -f "$readme" ] || continue
  dir=$(dirname "$readme")
  topic=$(basename "$dir")
  st=$(sed -n 's/^status: *\\(.*\\)/\\1/p' "$readme" | head -1)
  title=$(sed -n 's/^title: *"\\(.*\\)"/\\1/p' "$readme" | head -1)
  [ -z "$title" ] && title="$topic"
  [ -z "$st" ] && st="?"
  printf "%-15s %-50s %s\\n" "[$st]" "$title" "topics/$topic/"
done | sort
"""
