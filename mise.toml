[tools]
node = "22"
"npm:wrangler" = "4"

[tasks.new]
description = "Create a new survey artifact. Usage: mise run new <kind> <name> [args]. Kinds: memo|report|notebook|reference|paper|course|lesson|inbox"
run = "python3 scripts/new.py \"$@\""

[tasks.index]
description = "Regenerate INDEX.md from topic and course frontmatter"
run = """
#!/usr/bin/env bash
set -euo pipefail

{
  echo "# Survey Index"
  echo ""
  echo "Auto-generated: $(date +%Y-%m-%d)"
  echo ""
  echo "## Topics"
  echo ""
  echo "| Title | Status | Tags | Created |"
  echo "|-------|--------|------|---------|"

  for readme in topics/*/README.md; do
    [ -f "$readme" ] || continue
    dir=$(dirname "$readme")
    topic=$(basename "$dir")

    title=$(sed -n 's/^title: *"\\(.*\\)"/\\1/p' "$readme" | head -1)
    st=$(sed -n 's/^status: *\\(.*\\)/\\1/p' "$readme" | head -1)
    tags=$(sed -n 's/^tags: *\\[\\(.*\\)\\]/\\1/p' "$readme" | head -1)
    created=$(sed -n 's/^created: *\\(.*\\)/\\1/p' "$readme" | head -1)

    [ -z "$title" ] && title="$topic"
    [ -z "$st" ] && st="?"

    echo "| [${title}](topics/${topic}/) | ${st} | ${tags} | ${created} |"
  done | sort -t'|' -k5 -r

  if [ -d courses ] && compgen -G "courses/*/README.md" > /dev/null; then
    echo ""
    echo "## Courses"
    echo ""
    echo "| Title | Status | Difficulty | Lessons | Tags |"
    echo "|-------|--------|------------|---------|------|"

    for readme in courses/*/README.md; do
      [ -f "$readme" ] || continue
      dir=$(dirname "$readme")
      course=$(basename "$dir")

      title=$(sed -n 's/^title: *"\\(.*\\)"/\\1/p' "$readme" | head -1)
      st=$(sed -n 's/^status: *\\(.*\\)/\\1/p' "$readme" | head -1)
      diff=$(sed -n 's/^difficulty: *\\(.*\\)/\\1/p' "$readme" | head -1)
      tags=$(sed -n 's/^tags: *\\[\\(.*\\)\\]/\\1/p' "$readme" | head -1)
      lesson_count=$(find "$dir" -maxdepth 1 -type f -name '[0-9][0-9]-*.md' | wc -l | tr -d ' ')

      [ -z "$title" ] && title="$course"
      [ -z "$st" ] && st="?"
      [ -z "$diff" ] && diff="-"

      echo "| [${title}](courses/${course}/) | ${st} | ${diff} | ${lesson_count} | ${tags} |"
    done | sort -t'|' -k2
  fi
} > INDEX.md

echo "INDEX.md updated"

python3 scripts/backlinks.py
python3 scripts/trace-footer.py --apply
"""

[tasks.fm]
description = "Primitive: dump all topic frontmatter as JSON array (compose with jq for tags/related/search)"
run = """
#!/usr/bin/env bash
set -euo pipefail

for readme in topics/*/README.md; do
  [ -f "$readme" ] || continue
  dir=$(dirname "$readme")
  topic=$(basename "$dir")

  frontmatter=$(awk '/^---$/{if(n++)exit}n' "$readme")

  title=$(echo "$frontmatter" | sed -n 's/^title: *"\\(.*\\)"/\\1/p')
  status=$(echo "$frontmatter" | sed -n 's/^status: *\\(.*\\)/\\1/p')
  created=$(echo "$frontmatter" | sed -n 's/^created: *\\(.*\\)/\\1/p')

  # Parse tags: inline [a, b] or multi-line "  - a"
  tags_raw=$(echo "$frontmatter" | sed -n 's/^tags: *\\[\\(.*\\)\\]/\\1/p')
  if [ -n "$tags_raw" ]; then
    tags_json=$(echo "$tags_raw" | tr ',' '\\n' | sed 's/^ *//;s/ *$//' | jq -R . | jq -s .)
  else
    tags_json=$(echo "$frontmatter" | awk '/^tags:/{found=1; next} found && /^  - /{gsub(/^  - /,""); print; next} found{found=0}' | jq -R . | jq -s .)
  fi

  # Parse related: inline [a, b] or multi-line "  - a"
  related_raw=$(echo "$frontmatter" | sed -n 's/^related: *\\[\\(.*\\)\\]/\\1/p')
  if [ -n "$related_raw" ]; then
    related_json=$(echo "$related_raw" | tr ',' '\\n' | sed 's/^ *//;s/ *$//' | jq -R . | jq -s .)
  else
    related_json=$(echo "$frontmatter" | awk '/^related:/{found=1; next} found && /^  - /{gsub(/^  - /,""); print; next} found{found=0}' | jq -R . | jq -s .)
  fi

  jq -n \\
    --arg topic "$topic" \\
    --arg title "${title:-$topic}" \\
    --arg status "${status:-unknown}" \\
    --argjson tags "$tags_json" \\
    --argjson related "$related_json" \\
    --arg created "${created:-}" \\
    --arg path "topics/${topic}/" \\
    '{topic: $topic, title: $title, status: $status, tags: $tags, related: $related, created: $created, path: $path}'
done | jq -s .
"""

[tasks.fm-related]
description = "Find topics related to the given topic by tag overlap"
run = """
#!/usr/bin/env bash
set -euo pipefail

target="${1:?Usage: mise run fm-related <topic-name>}"

dump=$(mise run fm 2>/dev/null)

target_tags=$(echo "$dump" | jq -e --arg t "$target" '.[] | select(.topic == $t) | .tags')
if [ $? -ne 0 ]; then
  echo "Error: topic '${target}' not found" >&2
  exit 1
fi

echo "$dump" | jq -r --arg t "$target" --argjson ttags "$target_tags" '
  .[] | select(.topic != $t) |
  . as $item |
  ($item.tags | map(select(. as $tag | $ttags | index($tag)))) as $shared |
  select(($shared | length) > 0) |
  "\\($shared | length)\\t\\($item.topic)\\t\\($shared | join(", "))"
' | sort -t$'\\t' -k1 -rn | while IFS=$'\\t' read -r count topic shared; do
  printf "%d\\t%-30s [%s]\\n" "$count" "$topic" "$shared"
done
"""

[tasks.fm-tags]
description = "List all unique tags with usage count"
run = """
#!/usr/bin/env bash
set -euo pipefail

mise run fm 2>/dev/null | jq -r '.[].tags[]' | sort | uniq -c | sort -rn
"""

