[tasks.list]
description = "List all topics with status"
run = """
#!/usr/bin/env bash
set -euo pipefail

for readme in topics/*/README.md; do
  [ -f "$readme" ] || continue
  dir=$(dirname "$readme")
  topic=$(basename "$dir")
  st=$(sed -n 's/^status: *\\(.*\\)/\\1/p' "$readme" | head -1)
  title=$(sed -n 's/^title: *"\\(.*\\)"/\\1/p' "$readme" | head -1)
  [ -z "$title" ] && title="$topic"
  [ -z "$st" ] && st="?"
  printf "%-15s %-50s %s\\n" "[$st]" "$title" "topics/$topic/"
done | sort
"""
