[tasks.index]
description = "Regenerate INDEX.md from topic and course frontmatter"
run = """
#!/usr/bin/env bash
set -euo pipefail

{
  echo "# Survey Index"
  echo ""
  echo "Auto-generated: $(date +%Y-%m-%d)"
  echo ""
  echo "## Topics"
  echo ""
  echo "| Title | Status | Tags | Created |"
  echo "|-------|--------|------|---------|"

  for readme in topics/*/README.md; do
    [ -f "$readme" ] || continue
    dir=$(dirname "$readme")
    topic=$(basename "$dir")

    title=$(sed -n 's/^title: *"\\(.*\\)"/\\1/p' "$readme" | head -1)
    st=$(sed -n 's/^status: *\\(.*\\)/\\1/p' "$readme" | head -1)
    tags=$(sed -n 's/^tags: *\\[\\(.*\\)\\]/\\1/p' "$readme" | head -1)
    created=$(sed -n 's/^created: *\\(.*\\)/\\1/p' "$readme" | head -1)

    [ -z "$title" ] && title="$topic"
    [ -z "$st" ] && st="?"

    echo "| [${title}](topics/${topic}/) | ${st} | ${tags} | ${created} |"
  done | sort -t'|' -k5 -r

  if [ -d courses ] && compgen -G "courses/*/README.md" > /dev/null; then
    echo ""
    echo "## Courses"
    echo ""
    echo "| Title | Status | Difficulty | Lessons | Tags |"
    echo "|-------|--------|------------|---------|------|"

    for readme in courses/*/README.md; do
      [ -f "$readme" ] || continue
      dir=$(dirname "$readme")
      course=$(basename "$dir")

      title=$(sed -n 's/^title: *"\\(.*\\)"/\\1/p' "$readme" | head -1)
      st=$(sed -n 's/^status: *\\(.*\\)/\\1/p' "$readme" | head -1)
      diff=$(sed -n 's/^difficulty: *\\(.*\\)/\\1/p' "$readme" | head -1)
      tags=$(sed -n 's/^tags: *\\[\\(.*\\)\\]/\\1/p' "$readme" | head -1)
      lesson_count=$(find "$dir" -maxdepth 1 -type f -name '[0-9][0-9]-*.md' | wc -l | tr -d ' ')

      [ -z "$title" ] && title="$course"
      [ -z "$st" ] && st="?"
      [ -z "$diff" ] && diff="-"

      echo "| [${title}](courses/${course}/) | ${st} | ${diff} | ${lesson_count} | ${tags} |"
    done | sort -t'|' -k2
  fi
} > INDEX.md

echo "INDEX.md updated"
"""

