[tasks.cited-by]
description = "Show topics that cite the given reference (forward-chaining for berrypicking)"
run = """
#!/usr/bin/env bash
set -euo pipefail

ref="${1:?Usage: mise run cited-by <reference-name>}"

# Strip leading 'references/' or trailing '.md' for convenience.
ref="${ref#references/}"
ref="${ref%.md}"

found=0
for readme in topics/*/README.md; do
  fm=$(awk '/^---$/{if(n++)exit}n' "$readme")
  # Match either inline list or block list of sources.
  if echo "$fm" | rg -q "^[[:space:]]*-[[:space:]]+\\\"?${ref}\\\"?[[:space:]]*$"; then
    topic=$(basename "$(dirname "$readme")")
    title=$(echo "$fm" | sed -n 's/^title: *"\\(.*\\)"/\\1/p' | head -1)
    [ -z "$title" ] && title="$topic"
    printf "%-50s %s\\n" "$topic" "$title"
    found=$((found+1))
  fi
done

if [ "$found" = "0" ]; then
  echo "No topic cites '${ref}'." >&2
  exit 1
fi
"""

[tasks.cites]
description = "List references cited by the given topic (backward-chaining for berrypicking)"
run = """
#!/usr/bin/env bash
set -euo pipefail

topic="${1:?Usage: mise run cites <topic-name>}"
readme="topics/${topic}/README.md"

if [ ! -f "$readme" ]; then
  echo "Topic not found: ${topic}" >&2
  exit 1
fi

fm=$(awk '/^---$/{if(n++)exit}n' "$readme")

# Inline form: sources: [a, b]
inline=$(echo "$fm" | sed -n 's/^sources: *\\[\\(.*\\)\\]/\\1/p' | head -1)
if [ -n "$inline" ]; then
  echo "$inline" | tr ',' '\\n' | sed 's/^ *//;s/ *$//;s/^"//;s/"$//' | grep -v '^$'
  exit 0
fi

# Block form: sources:\\n  - a\\n  - b
echo "$fm" | awk '/^sources:/{f=1;next} f && /^  - /{gsub(/^  - /,"");gsub(/^"|"$/,"");print;next} f{exit}'
"""

[tasks.deploy]
description = "Build viewer and deploy to Cloudflare Pages"
run = """
#!/usr/bin/env bash
set -euo pipefail

cd viewer
bun install --frozen-lockfile
bun run build
cd ..
wrangler pages deploy viewer/dist --project-name survey-any
"""

