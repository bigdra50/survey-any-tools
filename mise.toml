[tasks.db]
description = "D1 database operations. Usage: mise run db <migrate-local|migrate-remote|tables-local>"
run = """
#!/usr/bin/env bash
set -euo pipefail

action="${1:?Usage: mise run db <migrate-local|migrate-remote|tables-local>}"
shift
case "$action" in
  migrate-local)
    wrangler d1 migrations apply survey-any-progress --local "$@"
    ;;
  migrate-remote)
    wrangler d1 migrations apply survey-any-progress --remote "$@"
    ;;
  tables-local)
    wrangler d1 execute survey-any-progress --local \\
      --command="SELECT name FROM sqlite_master WHERE type='table' ORDER BY name"
    ;;
  *)
    echo "Unknown action: $action" >&2
    echo "Actions: migrate-local, migrate-remote, tables-local" >&2
    exit 1
    ;;
esac
"""

