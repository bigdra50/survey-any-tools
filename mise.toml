[tasks.new-lesson]
description = "Create a new lesson inside a course (auto-numbered)"
run = """
#!/usr/bin/env bash
set -euo pipefail

course="${1:?Usage: mise run new-lesson <course-name> <slug>}"
slug="${2:?Usage: mise run new-lesson <course-name> <slug>}"
dir="courses/${course}"

if [ ! -d "$dir" ]; then
  echo "Error: ${dir} does not exist. Run 'mise run new-course ${course}' first." >&2
  exit 1
fi

# Next order: largest existing NN prefix + 1
max=$(find "$dir" -maxdepth 1 -type f -name '[0-9][0-9]-*.md' -print 2>/dev/null \\
  | sed 's|.*/||' | sed 's/^\\([0-9][0-9]\\)-.*/\\1/' | sort -n | tail -1)
if [ -z "$max" ]; then
  next=1
else
  next=$((10#$max + 1))
fi
order=$(printf '%02d' "$next")
file="${dir}/${order}-${slug}.md"

if [ -f "$file" ]; then
  echo "Error: ${file} already exists" >&2
  exit 1
fi

sed -e "s/^order: 0/order: ${next}/" templates/lesson.md > "$file"
echo "Created ${file}"
"""

[tasks.new-inbox]
description = "Create a new inbox entry (external capture)"
run = """
#!/usr/bin/env bash
set -euo pipefail

slug="${1:?Usage: mise run new-inbox <slug> [source_path]}"
source_path="${2:-$PWD}"

timestamp=$(date +%Y-%m-%d-%H%M%S)
captured=$(date +%Y-%m-%dT%H:%M:%S%z)
file="inbox/${timestamp}-${slug}.md"

mkdir -p inbox

if [ -f "$file" ]; then
  echo "Error: ${file} already exists" >&2
  exit 1
fi

esc_source=$(printf '%s' "$source_path" | sed 's/[\\/&]/\\\\&/g')
sed -e "s/CAPTURED_AT/${captured}/" \\
    -e "s/SOURCE_PATH/${esc_source}/" \\
    templates/inbox.md > "${file}"

echo "Created ${file}"
"""

[tasks.fm-dump]
description = "Dump all topic frontmatter as JSON array"
run = """
#!/usr/bin/env bash
set -euo pipefail

for readme in topics/*/README.md; do
  [ -f "$readme" ] || continue
  dir=$(dirname "$readme")
  topic=$(basename "$dir")

  frontmatter=$(awk '/^---$/{if(n++)exit}n' "$readme")

  title=$(echo "$frontmatter" | sed -n 's/^title: *"\\(.*\\)"/\\1/p')
  status=$(echo "$frontmatter" | sed -n 's/^status: *\\(.*\\)/\\1/p')
  created=$(echo "$frontmatter" | sed -n 's/^created: *\\(.*\\)/\\1/p')

  # Parse tags: inline [a, b] or multi-line "  - a"
  tags_raw=$(echo "$frontmatter" | sed -n 's/^tags: *\\[\\(.*\\)\\]/\\1/p')
  if [ -n "$tags_raw" ]; then
    tags_json=$(echo "$tags_raw" | tr ',' '\\n' | sed 's/^ *//;s/ *$//' | jq -R . | jq -s .)
  else
    tags_json=$(echo "$frontmatter" | awk '/^tags:/{found=1; next} found && /^  - /{gsub(/^  - /,""); print; next} found{found=0}' | jq -R . | jq -s .)
  fi

  # Parse related: inline [a, b] or multi-line "  - a"
  related_raw=$(echo "$frontmatter" | sed -n 's/^related: *\\[\\(.*\\)\\]/\\1/p')
  if [ -n "$related_raw" ]; then
    related_json=$(echo "$related_raw" | tr ',' '\\n' | sed 's/^ *//;s/ *$//' | jq -R . | jq -s .)
  else
    related_json=$(echo "$frontmatter" | awk '/^related:/{found=1; next} found && /^  - /{gsub(/^  - /,""); print; next} found{found=0}' | jq -R . | jq -s .)
  fi

  jq -n \\
    --arg topic "$topic" \\
    --arg title "${title:-$topic}" \\
    --arg status "${status:-unknown}" \\
    --argjson tags "$tags_json" \\
    --argjson related "$related_json" \\
    --arg created "${created:-}" \\
    --arg path "topics/${topic}/" \\
    '{topic: $topic, title: $title, status: $status, tags: $tags, related: $related, created: $created, path: $path}'
done | jq -s .
"""

[tasks.fm-related]
description = "Find topics related to the given topic by tag overlap"
run = """
#!/usr/bin/env bash
set -euo pipefail

target="${1:?Usage: mise run fm-related <topic-name>}"

dump=$(mise run fm-dump 2>/dev/null)

target_tags=$(echo "$dump" | jq -e --arg t "$target" '.[] | select(.topic == $t) | .tags')
if [ $? -ne 0 ]; then
  echo "Error: topic '${target}' not found" >&2
  exit 1
fi

echo "$dump" | jq -r --arg t "$target" --argjson ttags "$target_tags" '
  .[] | select(.topic != $t) |
  . as $item |
  ($item.tags | map(select(. as $tag | $ttags | index($tag)))) as $shared |
  select(($shared | length) > 0) |
  "\\($shared | length)\\t\\($item.topic)\\t\\($shared | join(", "))"
' | sort -t$'\\t' -k1 -rn | while IFS=$'\\t' read -r count topic shared; do
  printf "%d\\t%-30s [%s]\\n" "$count" "$topic" "$shared"
done
"""

[tasks.fm-tags]
description = "List all unique tags with usage count"
run = """
#!/usr/bin/env bash
set -euo pipefail

mise run fm-dump 2>/dev/null | jq -r '.[].tags[]' | sort | uniq -c | sort -rn
"""

[tasks.review-due]
description = "List topics due for CREW/MUSTIE-style review (stale memo / in-progress / explicit review_at)"
run = """
#!/usr/bin/env bash
set -euo pipefail

# Defaults: memo > 30d, in-progress > 90d, done > 365d.
# Override with --memo N --inprog N --done N. --json emits JSON.
memo_days=30
inprog_days=90
done_days=365
emit_json=false

while [ $# -gt 0 ]; do
  case "$1" in
    --memo) memo_days="$2"; shift 2 ;;
    --inprog) inprog_days="$2"; shift 2 ;;
    --done) done_days="$2"; shift 2 ;;
    --json) emit_json=true; shift ;;
    *) echo "Unknown arg: $1" >&2; exit 2 ;;
  esac
done

today_epoch=$(date -u +%s)

epoch_of() {
  # Accept YYYY-MM-DD or YYYY-MM-DDTHH:MM:SS(+ZZZZ). Fall back to 0 on parse error.
  local d="${1%%T*}"
  [ -z "$d" ] && { echo 0; return; }
  if date -j -f "%Y-%m-%d" "$d" +%s 2>/dev/null; then return; fi
  date -d "$d" +%s 2>/dev/null || echo 0
}

age_days() {
  local e=$1
  echo $(( (today_epoch - e) / 86400 ))
}

results="[]"

scan_dir() {
  local dir="$1"
  local kind="$2"
  for readme in "$dir"/*/README.md "$dir"/*.md; do
    [ -f "$readme" ] || continue
    local fm topic title status created updated review_at
    fm=$(awk '/^---$/{if(n++)exit}n' "$readme")
    [ -z "$fm" ] && continue

    if [ "$kind" = "topic" ] || [ "$kind" = "course" ]; then
      topic=$(basename "$(dirname "$readme")")
    else
      topic=$(basename "$readme" .md)
    fi
    title=$(echo "$fm" | sed -n 's/^title: *"\\(.*\\)"/\\1/p' | head -1)
    status=$(echo "$fm" | sed -n 's/^status: *\\(.*\\)/\\1/p' | head -1 | tr -d '"')
    created=$(echo "$fm" | sed -n 's/^created: *\\(.*\\)/\\1/p' | head -1 | tr -d '"')
    updated=$(echo "$fm" | sed -n 's/^updated: *\\(.*\\)/\\1/p' | head -1 | tr -d '"')
    review_at=$(echo "$fm" | sed -n 's/^review_at: *\\(.*\\)/\\1/p' | head -1 | tr -d '"')

    [ -z "$title" ] && title="$topic"
    [ -z "$updated" ] && updated="$created"

    local upd_epoch=0 age=-1
    if [ -n "$updated" ]; then
      upd_epoch=$(epoch_of "$updated")
      [ "$upd_epoch" != "0" ] && age=$(age_days "$upd_epoch")
    fi

    local reason="" threshold=0
    case "$status" in
      memo)        threshold=$memo_days ;;
      in-progress) threshold=$inprog_days ;;
      done)        threshold=$done_days ;;
      *)           threshold=$inprog_days ;;
    esac

    if [ -n "$review_at" ]; then
      local r_epoch
      r_epoch=$(epoch_of "$review_at")
      if [ "$r_epoch" != "0" ] && [ "$r_epoch" -le "$today_epoch" ]; then
        reason="review_at past"
      fi
    fi

    if [ -z "$reason" ] && [ "$age" -ge 0 ] && [ "$age" -ge "$threshold" ]; then
      reason="stale ${status:-unknown} (${age}d >= ${threshold}d)"
    fi

    [ -z "$reason" ] && continue

    results=$(echo "$results" | jq \\
      --arg kind "$kind" \\
      --arg name "$topic" \\
      --arg title "$title" \\
      --arg status "${status:-unknown}" \\
      --arg updated "${updated:-}" \\
      --argjson age "$age" \\
      --arg reason "$reason" \\
      --arg path "$readme" \\
      '. + [{kind: $kind, name: $name, title: $title, status: $status, updated: $updated, age_days: $age, reason: $reason, path: $path}]')
  done
}

# References hold immutable bibliographic records (date = publication date),
# so they aren't subject to weeding by age. Topics/courses encode our own
# work and are weed-eligible.
scan_dir topics topic
scan_dir courses course

results=$(echo "$results" | jq 'sort_by(-.age_days)')

if $emit_json; then
  echo "$results"
  exit 0
fi

count=$(echo "$results" | jq 'length')
echo "Review-due entries: $count"
echo
echo "$results" | jq -r '.[] | "\\(.kind|ascii_upcase)\\t\\(.age_days)d\\t\\(.status)\\t\\(.name)\\t\\(.reason)"' \\
  | awk -F'\\t' 'BEGIN{printf "%-10s %-6s %-12s %-50s %s\\n", "KIND", "AGE", "STATUS", "NAME", "REASON"} {printf "%-10s %-6s %-12s %-50s %s\\n", $1, $2, $3, $4, $5}'
"""

[tasks.search]
description = "Search topics by tag"
run = """
#!/usr/bin/env bash
set -euo pipefail

tag="${1:?Usage: mise run search <tag>}"
echo "Topics tagged with: ${tag}"
echo "---"
rg -l "tags:.*${tag}" topics/*/README.md 2>/dev/null | while read -r f; do
  dir=$(dirname "$f")
  topic=$(basename "$dir")
  title=$(sed -n 's/^title: *"\\(.*\\)"/\\1/p' "$f" | head -1)
  [ -z "$title" ] && title="$topic"
  echo "- ${title} (topics/${topic}/)"
done
"""

