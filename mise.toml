[tasks.new-lesson]
description = "Create a new lesson inside a course (auto-numbered)"
run = """
#!/usr/bin/env bash
set -euo pipefail

course="${1:?Usage: mise run new-lesson <course-name> <slug>}"
slug="${2:?Usage: mise run new-lesson <course-name> <slug>}"
dir="courses/${course}"

if [ ! -d "$dir" ]; then
  echo "Error: ${dir} does not exist. Run 'mise run new-course ${course}' first." >&2
  exit 1
fi

# Next order: largest existing NN prefix + 1
max=$(find "$dir" -maxdepth 1 -type f -name '[0-9][0-9]-*.md' -print 2>/dev/null \\
  | sed 's|.*/||' | sed 's/^\\([0-9][0-9]\\)-.*/\\1/' | sort -n | tail -1)
if [ -z "$max" ]; then
  next=1
else
  next=$((10#$max + 1))
fi
order=$(printf '%02d' "$next")
file="${dir}/${order}-${slug}.md"

if [ -f "$file" ]; then
  echo "Error: ${file} already exists" >&2
  exit 1
fi

sed -e "s/^order: 0/order: ${next}/" templates/lesson.md > "$file"
echo "Created ${file}"
"""

[tasks.new-inbox]
description = "Create a new inbox entry (external capture)"
run = """
#!/usr/bin/env bash
set -euo pipefail

slug="${1:?Usage: mise run new-inbox <slug> [source_path]}"
source_path="${2:-$PWD}"

timestamp=$(date +%Y-%m-%d-%H%M%S)
captured=$(date +%Y-%m-%dT%H:%M:%S%z)
file="inbox/${timestamp}-${slug}.md"

mkdir -p inbox

if [ -f "$file" ]; then
  echo "Error: ${file} already exists" >&2
  exit 1
fi

esc_source=$(printf '%s' "$source_path" | sed 's/[\\/&]/\\\\&/g')
sed -e "s/CAPTURED_AT/${captured}/" \\
    -e "s/SOURCE_PATH/${esc_source}/" \\
    templates/inbox.md > "${file}"

echo "Created ${file}"
"""

[tasks.fm-dump]
description = "Dump all topic frontmatter as JSON array"
run = """
#!/usr/bin/env bash
set -euo pipefail

for readme in topics/*/README.md; do
  [ -f "$readme" ] || continue
  dir=$(dirname "$readme")
  topic=$(basename "$dir")

  frontmatter=$(awk '/^---$/{if(n++)exit}n' "$readme")

  title=$(echo "$frontmatter" | sed -n 's/^title: *"\\(.*\\)"/\\1/p')
  status=$(echo "$frontmatter" | sed -n 's/^status: *\\(.*\\)/\\1/p')
  created=$(echo "$frontmatter" | sed -n 's/^created: *\\(.*\\)/\\1/p')

  # Parse tags: inline [a, b] or multi-line "  - a"
  tags_raw=$(echo "$frontmatter" | sed -n 's/^tags: *\\[\\(.*\\)\\]/\\1/p')
  if [ -n "$tags_raw" ]; then
    tags_json=$(echo "$tags_raw" | tr ',' '\\n' | sed 's/^ *//;s/ *$//' | jq -R . | jq -s .)
  else
    tags_json=$(echo "$frontmatter" | awk '/^tags:/{found=1; next} found && /^  - /{gsub(/^  - /,""); print; next} found{found=0}' | jq -R . | jq -s .)
  fi

  # Parse related: inline [a, b] or multi-line "  - a"
  related_raw=$(echo "$frontmatter" | sed -n 's/^related: *\\[\\(.*\\)\\]/\\1/p')
  if [ -n "$related_raw" ]; then
    related_json=$(echo "$related_raw" | tr ',' '\\n' | sed 's/^ *//;s/ *$//' | jq -R . | jq -s .)
  else
    related_json=$(echo "$frontmatter" | awk '/^related:/{found=1; next} found && /^  - /{gsub(/^  - /,""); print; next} found{found=0}' | jq -R . | jq -s .)
  fi

  jq -n \\
    --arg topic "$topic" \\
    --arg title "${title:-$topic}" \\
    --arg status "${status:-unknown}" \\
    --argjson tags "$tags_json" \\
    --argjson related "$related_json" \\
    --arg created "${created:-}" \\
    --arg path "topics/${topic}/" \\
    '{topic: $topic, title: $title, status: $status, tags: $tags, related: $related, created: $created, path: $path}'
done | jq -s .
"""

[tasks.fm-related]
description = "Find topics related to the given topic by tag overlap"
run = """
#!/usr/bin/env bash
set -euo pipefail

target="${1:?Usage: mise run fm-related <topic-name>}"

dump=$(mise run fm-dump 2>/dev/null)

target_tags=$(echo "$dump" | jq -e --arg t "$target" '.[] | select(.topic == $t) | .tags')
if [ $? -ne 0 ]; then
  echo "Error: topic '${target}' not found" >&2
  exit 1
fi

echo "$dump" | jq -r --arg t "$target" --argjson ttags "$target_tags" '
  .[] | select(.topic != $t) |
  . as $item |
  ($item.tags | map(select(. as $tag | $ttags | index($tag)))) as $shared |
  select(($shared | length) > 0) |
  "\\($shared | length)\\t\\($item.topic)\\t\\($shared | join(", "))"
' | sort -t$'\\t' -k1 -rn | while IFS=$'\\t' read -r count topic shared; do
  printf "%d\\t%-30s [%s]\\n" "$count" "$topic" "$shared"
done
"""

[tasks.fm-tags]
description = "List all unique tags with usage count"
run = """
#!/usr/bin/env bash
set -euo pipefail

mise run fm-dump 2>/dev/null | jq -r '.[].tags[]' | sort | uniq -c | sort -rn
"""

[tasks.review-due]
description = "List topics due for CREW/MUSTIE-style review (stale memo / in-progress / explicit review_at)"
run = "python3 scripts/review-due.py \"$@\""

[tasks.search]
description = "Search topics by tag"
run = """
#!/usr/bin/env bash
set -euo pipefail

tag="${1:?Usage: mise run search <tag>}"
echo "Topics tagged with: ${tag}"
echo "---"
rg -l "tags:.*${tag}" topics/*/README.md 2>/dev/null | while read -r f; do
  dir=$(dirname "$f")
  topic=$(basename "$dir")
  title=$(sed -n 's/^title: *"\\(.*\\)"/\\1/p' "$f" | head -1)
  [ -z "$title" ] && title="$topic"
  echo "- ${title} (topics/${topic}/)"
done
"""

